apiVersion: apps/v1
kind: Deployment
metadata:
  name: cicd-project

spec:
  replicas: 2

  selector:
    matchLabels:
      app: cicd-project

  template:
    metadata:
      labels:
        app: cicd-project

    spec:
      containers:
      - name: cicd-project
        image: 911167911799.dkr.ecr.ap-south-1.amazonaws.com/cicd-project:latest

        ports:
        - containerPort: 3000
